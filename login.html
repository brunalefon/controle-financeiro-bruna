<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Controle Financeiro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f2f5 0%, #e8eaf6 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.12);
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .login-card h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 0.2rem;
    }
    .login-card p.sub {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-top: -0.8rem;
    }
    label {
      font-size: 0.85rem;
      color: #444;
      font-weight: 600;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    input {
      padding: 0.75rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #6c63ff; }
    .btn-login {
      padding: 0.85rem;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover { background: #574fd6; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .erro {
      color: #e53935;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      background: #fff3f3;
      padding: 0.5rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>💰 Controle Financeiro</h1>
    <p class="sub">Faça login para continuar</p>

    <div class="field">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username" />
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" />
    </div>

    <p class="erro" id="erro">❌ Usuário ou senha incorretos.</p>

    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>

  <script>
    if (sessionStorage.getItem('logado') === 'sim') {
      window.location.href = 'index.html';
    }

    function fazerLogin() {
      var usuario = document.getElementById('usuario').value.trim();
      var senha   = document.getElementById('senha').value;
      if (usuario === 'Betsy' && senha === 'eusouacheetos') {
        sessionStorage.setItem('logado', 'sim');
        window.location.href = 'index.html';
      } else {
        document.getElementById('erro').style.display = 'block';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
</body>
</html>
